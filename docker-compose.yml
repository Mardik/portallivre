services:
  postgres:
    image: postgres:16-alpine
    container_name: portallivre-postgres
    ports:
      - '5432:5432'
    environment:
      POSTGRES_DB: portallivre
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d portallivre']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres-data:
